<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <script src="./config.js"></script>
</head>
<body class="bg-slate-50 h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl flex flex-col overflow-hidden h-[80vh]">
        <div class="bg-indigo-600 p-4 text-white font-semibold text-center shadow-md">
            FastAPI Chat Assistant
        </div>

        <div id="chat-window" class="chat-container flex-1 overflow-y-auto p-6 space-y-4">
            <div class="flex justify-start">
                <div class="bg-slate-100 text-slate-800 rounded-2xl px-4 py-2 max-w-[80%]">
                    Hello! How can I help you today?
                </div>
            </div>
        </div>

        <form id="chat-form" class="p-4 border-t border-slate-100 flex gap-2">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Type your message..." 
                class="flex-1 border border-slate-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
            >
            <button 
                type="submit" 
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-full transition-colors font-medium"
            >
                Send
            </button>
        </form>
    </div>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        // Function to add messages to the UI
        function addMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex justify-end" : "flex justify-start";
            
            const bubble = document.createElement('div');
            bubble.className = isUser 
                ? "bg-indigo-600 text-white rounded-2xl px-4 py-2 max-w-[80%]" 
                : "bg-slate-100 text-slate-800 rounded-2xl px-4 py-2 max-w-[80%]";
            
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            
            // Auto-scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';

            const loading = document.createElement("div");
            loading.className = "flex justify-start";
            loading.innerHTML = `
                <div class="bg-slate-100 text-slate-500 rounded-2xl px-4 py-2 max-w-[80%]">
                    Thinking...
                </div>`;
            chatWindow.appendChild(loading);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {

                // const response = await fetch("http://127.0.0.1:8000/chat", 
                const response = await fetch(`${SERVER_URL}/chat`,
                {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message})
                });

                if (!response.ok) throw new Error("Server error");

                const data = await response.json();

                loading.remove();
                addMessage(data.reply);

            } catch (err) {
                loading.remove();
                addMessage("Server connection failed.");
                console.error(err);
            }
        });
    </script>
</body>
</html>
